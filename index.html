<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizza Night — You're Invited!</title>
  <meta name="description" content="You're invited to Pizza Night! Saturday 7/11/26 at 5:30 PM.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Italiana&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #c0392b;
      --red-light: #d4564a;
      --cream: #faf6f0;
      --cream-dark: #f0e8dc;
      --wine: #722f37;
      --text: #3a1c1c;
      --text-light: #8a6a6a;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Corner illustrations */
    .corner-art {
      position: fixed;
      z-index: 0;
      pointer-events: none;
    }

    .corner-art.top-left {
      top: -20px;
      left: -20px;
      width: min(320px, 45vw);
      height: auto;
      opacity: 0;
      animation: cornerFade 1.2s ease forwards 0.2s;
    }

    .corner-art.bottom-right {
      bottom: -20px;
      right: -20px;
      width: min(300px, 42vw);
      height: auto;
      opacity: 0;
      animation: cornerFade 1.2s ease forwards 0.6s;
    }

    @keyframes cornerFade {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 5rem 2rem;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
    }

    /* "You're invited to" */
    .invite-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--red);
      opacity: 0;
      animation: softReveal 1s ease forwards 0.8s;
    }

    /* PIZZA NIGHT title */
    .title {
      font-family: 'Italiana', serif;
      font-size: clamp(3.2rem, 14vw, 6.5rem);
      font-weight: 400;
      line-height: 0.95;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0;
      animation: titleReveal 1.4s ease forwards 1.2s;
    }

    @keyframes titleReveal {
      0% {
        opacity: 0;
        transform: scale(0.85);
        letter-spacing: 0.2em;
      }
      60% {
        opacity: 1;
        transform: scale(1.02);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        letter-spacing: 0.08em;
      }
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: softReveal 0.8s ease forwards 1.8s;
    }

    .divider-line {
      width: 50px;
      height: 1px;
      background: var(--red-light);
      opacity: 0.4;
    }

    .divider-icon {
      color: var(--red);
      opacity: 0.6;
    }

    /* Date */
    .date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--wine);
      opacity: 0;
      animation: softReveal 0.7s ease forwards 2.1s;
    }

    /* Time */
    .time {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.5rem;
      color: var(--red);
      opacity: 0;
      animation: softReveal 0.7s ease forwards 2.4s;
    }

    /* Address */
    .address {
      opacity: 0;
      animation: softReveal 0.7s ease forwards 2.7s;
    }

    .address-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: var(--text-light);
      margin-bottom: 0.4rem;
    }

    .address a {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }

    .address a:hover {
      border-bottom-color: var(--red-light);
    }

    /* Soft reveal animation */
    @keyframes softReveal {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Gentle floating for corner art after load */
    .corner-art.loaded {
      animation: gentleFloat 6s ease-in-out infinite alternate;
    }

    @keyframes gentleFloat {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg); }
      100% { opacity: 1; transform: translate(4px, -6px) rotate(1deg); }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .container { padding: 4rem 1.5rem; gap: 1.5rem; }
      .corner-art.top-left { width: min(220px, 55vw); }
      .corner-art.bottom-right { width: min(200px, 50vw); }
    }
  </style>
</head>
<body>

  <!-- Top-left corner art: pizza + ingredients -->
  <svg class="corner-art top-left" viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Pizza -->
    <ellipse cx="100" cy="100" rx="90" ry="85" stroke="var(--red)" stroke-width="2" fill="none"/>
    <ellipse cx="100" cy="100" rx="80" ry="76" stroke="var(--red)" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Slices -->
    <line x1="100" y1="15" x2="100" y2="185" stroke="var(--red)" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="85" x2="185" y2="115" stroke="var(--red)" stroke-width="1.5" opacity="0.5"/>
    <!-- Toppings -->
    <circle cx="70" cy="65" r="8" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="130" cy="75" r="7" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="85" cy="130" r="9" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="125" cy="135" r="6" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <!-- Basil leaves -->
    <path d="M60 110 Q65 100 75 105 Q65 115 60 110Z" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <path d="M140 90 Q145 80 155 85 Q145 95 140 90Z" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <!-- Scattered tomatoes -->
    <circle cx="210" cy="50" r="12" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="215" cy="45" r="4" stroke="var(--red)" stroke-width="1" fill="none"/>
    <circle cx="230" cy="80" r="8" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <circle cx="250" cy="60" r="6" stroke="var(--red)" stroke-width="1" fill="none"/>
    <!-- Wine glass -->
    <path d="M270 30 Q260 60 260 80 L280 80 Q280 60 270 30Z" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <line x1="270" y1="80" x2="270" y2="110" stroke="var(--red)" stroke-width="1.5"/>
    <line x1="258" y1="110" x2="282" y2="110" stroke="var(--red)" stroke-width="1.5"/>
    <!-- Pepper -->
    <path d="M200 140 Q195 120 210 115 Q215 130 200 140Z" stroke="var(--red)" stroke-width="1.3" fill="none"/>
    <line x1="205" y1="115" x2="208" y2="105" stroke="var(--red)" stroke-width="1.2"/>
    <!-- Small mushroom -->
    <path d="M240 130 Q245 118 255 125 Q250 130 240 130Z" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <line x1="248" y1="130" x2="248" y2="140" stroke="var(--red)" stroke-width="1.2"/>
    <!-- Cherry tomatoes cluster -->
    <circle cx="180" cy="200" r="10" stroke="var(--red)" stroke-width="1.3" fill="none"/>
    <circle cx="198" cy="195" r="9" stroke="var(--red)" stroke-width="1.3" fill="none"/>
    <circle cx="190" cy="212" r="8" stroke="var(--red)" stroke-width="1.3" fill="none"/>
    <path d="M185 190 Q190 178 195 185" stroke="var(--red)" stroke-width="1" fill="none"/>
  </svg>

  <!-- Bottom-right corner art: pizza slice + wine -->
  <svg class="corner-art bottom-right" viewBox="0 0 300 280" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Pizza with slices -->
    <ellipse cx="210" cy="190" rx="80" ry="76" stroke="var(--red)" stroke-width="2" fill="none"/>
    <ellipse cx="210" cy="190" rx="70" ry="66" stroke="var(--red)" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Slice lines -->
    <line x1="210" y1="114" x2="180" y2="264" stroke="var(--red)" stroke-width="1.5" opacity="0.5"/>
    <line x1="135" y1="165" x2="285" y2="215" stroke="var(--red)" stroke-width="1.5" opacity="0.5"/>
    <!-- Toppings -->
    <circle cx="190" cy="165" r="7" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="235" cy="175" r="8" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="200" cy="215" r="6" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <circle cx="240" cy="210" r="7" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <!-- Basil -->
    <path d="M220 200 Q225 190 235 195 Q225 205 220 200Z" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <path d="M175 195 Q180 185 190 190 Q180 200 175 195Z" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <!-- Wine bottle -->
    <rect x="50" y="80" width="24" height="70" rx="4" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <rect x="56" y="60" width="12" height="22" rx="2" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <line x1="62" y1="55" x2="62" y2="60" stroke="var(--red)" stroke-width="1.5"/>
    <path d="M53 100 L71 100" stroke="var(--red)" stroke-width="1" opacity="0.4"/>
    <!-- Wine glass -->
    <path d="M105 90 Q95 120 95 140 L115 140 Q115 120 105 90Z" stroke="var(--red)" stroke-width="1.5" fill="none"/>
    <line x1="105" y1="140" x2="105" y2="170" stroke="var(--red)" stroke-width="1.5"/>
    <line x1="93" y1="170" x2="117" y2="170" stroke="var(--red)" stroke-width="1.5"/>
    <!-- Wine in glass -->
    <path d="M98 120 Q105 125 112 120" stroke="var(--red)" stroke-width="1" opacity="0.4"/>
    <!-- Olives -->
    <ellipse cx="80" cy="210" rx="8" ry="6" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <ellipse cx="95" cy="220" rx="7" ry="5" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <circle cx="84" cy="208" r="2" stroke="var(--red)" stroke-width="0.8" fill="none"/>
    <!-- Cheese wedge -->
    <path d="M30 240 L60 220 L65 260 Z" stroke="var(--red)" stroke-width="1.3" fill="none"/>
    <circle cx="45" cy="240" r="2" stroke="var(--red)" stroke-width="0.8" fill="none"/>
    <circle cx="52" cy="248" r="1.5" stroke="var(--red)" stroke-width="0.8" fill="none"/>
    <!-- Cherry tomatoes -->
    <circle cx="120" cy="50" r="9" stroke="var(--red)" stroke-width="1.3" fill="none"/>
    <circle cx="138" cy="55" r="7" stroke="var(--red)" stroke-width="1.2" fill="none"/>
    <path d="M125 42 Q130 35 135 40" stroke="var(--red)" stroke-width="1" fill="none"/>
  </svg>

  <div class="container">
    <p class="invite-text">You're invited to</p>

    <h1 class="title">Pizza<br>Night</h1>

    <div class="divider">
      <div class="divider-line"></div>
      <svg class="divider-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 3 Q8 12 8 17 A4 4 0 0 0 16 17 Q16 12 12 3Z"/>
      </svg>
      <div class="divider-line"></div>
    </div>

    <div class="date">Saturday, July 11, 2026</div>

    <div class="time">5:30 PM</div>

    <div class="address">
      <div class="address-label">Join us at</div>
      <a href="https://maps.google.com/?q=4250+Woodlake+Place+%23109+Raleigh+NC+27607" target="_blank" rel="noopener">
        4250 Woodlake Place #109<br>
        Raleigh, NC 27607
      </a>
    </div>
  </div>

  <script>
    document.querySelectorAll('.corner-art').forEach(el => {
      el.addEventListener('animationend', () => {
        el.classList.add('loaded');
      });
    });
  </script>
</body>
</html>
